# nginx reverse proxy for the Automotive Analyst API (VPS).
# The frontend (analyst.scottcampbell.io) is hosted on Cloudflare Pages; only the
# API needs nginx here, at analyst-api.scottcampbell.io -> FastAPI on :8010.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/analyst-api
#   sudo ln -s /etc/nginx/sites-available/analyst-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d analyst-api.scottcampbell.io

server {
    listen 80;
    server_name analyst-api.scottcampbell.io;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
